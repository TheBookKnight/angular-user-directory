name: Test Workflow

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Run npm ci
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run production build
        run: npm run build
