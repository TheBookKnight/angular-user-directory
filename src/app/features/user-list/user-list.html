<div class="user-list-container">
  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  } @else if (users.length === 0) {
    <p>Loading users...</p>
  } @else {
    <ul>
      @for (user of users; track user.id) {
        <li>
          <app-user-card [user]="user"></app-user-card>
        </li>
      }
    </ul>
  }
</div>
